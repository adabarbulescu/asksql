name: CI

on:
  push:
  pull_request:

jobs:
  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e .
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: npm run test:e2e
        working-directory: web
      - name: verify committed Studio bundle
        run: git diff --exit-code -- src/asksql/studio/static

  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - name: unit tests
        run: python -m coverage run -m unittest discover -q
      - name: coverage report
        run: python -m coverage report
      - name: TUI tests
        run: python -m unittest tests.test_tui -q
      - name: ruff check
        run: ruff check .
      - name: ruff format
        run: ruff format --check .
      - name: mypy
        run: mypy
      - name: build wheel
        run: python -m build --no-isolation
      - name: verify wheel
        run: python -m twine check dist/*
      - name: install wheel
        run: python -m pip install --force-reinstall dist/*.whl
      - name: smoke test
        run: asksql --yes run demo "select 1"

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: asksql
          POSTGRES_PASSWORD: asksql
          POSTGRES_DB: asksql
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asksql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ASKSQL_TEST_POSTGRES: postgresql://asksql:asksql@127.0.0.1:5432/asksql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev,postgres]"
      - run: python -m unittest tests.test_postgres_integration -q
