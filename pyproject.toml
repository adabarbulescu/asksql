[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "asksql"
version = "0.1.0"
description = "Ask your database questions from the terminal."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "asksql contributors" }]
keywords = ["sql", "sqlite", "ollama", "openai", "text-to-sql", "cli"]

[project.scripts]
asksql = "asksql.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
